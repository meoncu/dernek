name: dernek
description: Mobile-first donation and charity project management system built with Flutter and Firebase.
publish_to: 'none'
version: 0.1.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  google_sign_in: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
